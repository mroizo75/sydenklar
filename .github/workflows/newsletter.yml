name: Send weekly newsletter

on:
  schedule:
    - cron: '0 8 * * 1'   # Mandag kl. 08:00 UTC = 10:00 norsk sommertid
  workflow_dispatch:        # Manuell trigger for testing

jobs:
  send:
    name: Trigger newsletter send
    runs-on: ubuntu-latest
    steps:
      - name: Send newsletter via API
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ vars.SITE_URL || 'https://www.sydenklar.no' }}/api/newsletter/send" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $RESPONSE"
          cat /tmp/response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Newsletter send failed with status $RESPONSE"
            exit 1
          fi
